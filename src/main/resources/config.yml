# PetPlugin Configuration

# ELO Settings
elo:
  k-factor: 32
  default-elo: 500

# Battle Settings
battle:
  turn-timeout-seconds: 30
  # freeze players in place during battle (arena teleport placeholder)
  freeze-players: true
  # Countdown before battle starts (seconds)
  countdown_seconds: 3
  # How often to check boundary violations (ticks)
  arena_boundary_check_interval_ticks: 10
  # Queue timeout (seconds) — how long to wait for arena before cancelling
  queue_timeout_seconds: 60

# Quest Targets
quests:
  daily:
    MINE_ORE: 32
    WALK_BLOCKS: 500
    KILL_PLAYERS: 3
  weekly:
    KILL_BOSS: 2
    WIN_BATTLES: 5
    LONG_JOURNEY: 5000
    CRAFT_RARE: 10
    JOIN_EVENTS: 3

# Quest EXP Rewards
quest-rewards:
  daily:
    base-exp: 100
  weekly:
    base-exp: 500

# Status Effect Durations (seconds)
status-effects:
  poison-duration: 10
  burn-duration: 8
  stun-duration: 3
  poison-damage-per-tick: 3
  burn-damage-per-tick: 4
  burn-def-reduction: 0.20

# Level cap
level:
  cap: 50
  base-exp: 100

# Rare items list (material names for CRAFT_RARE quest)
rare-items:
  - ELYTRA
  - ENCHANTED_GOLDEN_APPLE
  - BEACON
  - END_CRYSTAL
  - SHULKER_BOX
  - NETHERITE_INGOT

# Performance tuning for 200+ player servers
performance:
  # Max concurrent battles per arena (hard limit)
  arena_max_concurrent_battles: 4
  # Particle cull radius — skip particles if no player nearby (blocks)
  particle_cull_radius: 20
  # Flush in-memory cache to YAML every N seconds
  data_flush_interval_seconds: 300

# Debug mode — verbose logging
debug: false
